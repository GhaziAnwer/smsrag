services:
  app:
    build: .
    container_name: sms-rag-app
    restart: unless-stopped
    ports:
      # Host port 8000 is commonly already used on shared servers.
      # Override SMSRAG_HOST_PORT if 8010 is not free.
      - "${SMSRAG_HOST_PORT:-8010}:8000"
    volumes:
      # Mount data directory (contains index_store for each client)
      - ${SMSRAG_DATA_DIR:-/opt/sms-rag-index-data}:/app/data:rw
      # Mount databases
      - ./chat_history.db:/app/chat_history.db:rw
      - ./feedback.db:/app/feedback.db:rw
      - ./query_logs.db:/app/query_logs.db:rw
    environment:
      - ENVIRONMENT=production
      - DOCKER_CONTAINER=true
      - BASE_DIR=/app/data
      - DEFAULT_CLIENT_ID=rsms
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-*}
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sms-rag-network

networks:
  sms-rag-network:
    driver: bridge
