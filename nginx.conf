# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name chatai.sl-sail.com;
    return 301 https://$host$request_uri;
}

# HTTPS vhost
server {
    listen 443 ssl http2;
    server_name chatai.sl-sail.com;

    # allow only self + sailerp.sl-sail.com to iframe you
    add_header Content-Security-Policy "frame-ancestors 'self' https://sailerp.sl-sail.com https://erp.sl-sail.com" always;

    # SSL certs from Certbot
    ssl_certificate     /etc/letsencrypt/live/chatai.sl-sail.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatai.sl-sail.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;


    #─────────────────────────────────────────────────────────────────────────
    # 1) DYNAMIC TENANT API: /<client>/api/*
    #    Routes to backend which handles multi-tenant routing
    #─────────────────────────────────────────────────────────────────────────
    location ~ ^/([a-zA-Z0-9_-]+)/api(/.*)?$ {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000/$1/api$2;

        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    #─────────────────────────────────────────────────────────────────────────
    # 2) GLOBAL API ENDPOINTS: /api/feedback, /api/dashboard
    #    These are tenant-agnostic endpoints
    #─────────────────────────────────────────────────────────────────────────
    location ^~ /api/ {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000/api/;

        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    #─────────────────────────────────────────────────────────────────────────
    # 3) DYNAMIC DOCUMENT SERVING: /<client>/docs/*
    #    Serves documents from /opt/sms-rag/data/<client>/documents/
    #─────────────────────────────────────────────────────────────────────────
    location ~ ^/([a-zA-Z0-9_-]+)/docs/(.*)$ {
        alias /opt/sms-rag/data/$1/documents/$2;
        autoindex off;
        try_files $uri =404;
        expires 1h;
        
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    #─────────────────────────────────────────────────────────────────────────
    # 4) STATIC HTML PAGES: login, dashboard, feedback
    #─────────────────────────────────────────────────────────────────────────
    location = /login.html {
        root /opt/sms-rag/static;
        try_files /login.html =404;
        expires 1h;
    }

    location = /dashboard.html {
        root /opt/sms-rag/static;
        try_files /dashboard.html =404;
        expires 1h;
    }

    location = /feedback-dashboard.html {
        root /opt/sms-rag/static;
        try_files /feedback-dashboard.html =404;
        expires 1h;
    }

    location = /feedback-integration.js {
        root /opt/sms-rag/static;
        try_files /feedback-integration.js =404;
        expires 1h;
        add_header Content-Type "application/javascript";
    }

    #─────────────────────────────────────────────────────────────────────────
    # 5) SPA ROOT: Serve index.html and static assets
    #─────────────────────────────────────────────────────────────────────────
    location / {
        root /opt/sms-rag/static;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        expires 1h;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}