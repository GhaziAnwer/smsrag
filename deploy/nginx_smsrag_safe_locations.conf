# Add these locations inside the existing server { ... } block in:
# /etc/nginx/conf.d/safelanes.conf
#
# This snippet is intentionally narrow:
# - It uses port 8010, not 8000, so existing Docker apps keep their ports.
# - Tenant regexes are limited to SMS RAG clients so /graph-ai-V2/api/ is not intercepted.
# - Existing /rsms/docs/ alias can remain as-is if SMSRAG_DATA_DIR=/opt/sms-rag-index-data.

# =============================
# SMS RAG APP - Docker backend on 127.0.0.1:8010
# =============================

location = /sms-rag-health {
    proxy_pass http://127.0.0.1:8010/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Tenant APIs: /rsms/api/*, /oceangold/api/*, /supereco/api/*, /almi/api/*
location ~ ^/(rsms|oceangold|supereco|almi)/api(/.*)?$ {
    proxy_pass http://127.0.0.1:8010/$1/api$2;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
}

# Global feedback/dashboard APIs.
location ^~ /api/ {
    proxy_pass http://127.0.0.1:8010/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
}

# Keep your existing ^~ /rsms/docs/ alias if it points to:
# /opt/sms-rag-index-data/rsms/documents/
# Other tenant documents can be proxied through the app.
location ~ ^/(oceangold|supereco|almi)/docs/(.*)$ {
    proxy_pass http://127.0.0.1:8010/$1/docs/$2;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# SMS RAG static entry points.
location = / {
    proxy_pass http://127.0.0.1:8010/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/(rsms|oceangold|supereco|almi)/?$ {
    proxy_pass http://127.0.0.1:8010/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/(style\.css|script\.js|feedback-integration\.js|login\.html|dashboard\.html|feedback-dashboard\.html)$ {
    proxy_pass http://127.0.0.1:8010/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
